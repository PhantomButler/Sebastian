services:
  gateway:
    build: .
    env_file: .env
    environment:
      SEBASTIAN_DATA_DIR: /app/data
    ports:
      - "8823:8823"
    volumes:
      - ./data:/app/data
      - ./knowledge:/app/knowledge
      - ./sebastian/agents:/app/sebastian/agents
      - ./sebastian/capabilities:/app/sebastian/capabilities
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8823/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

